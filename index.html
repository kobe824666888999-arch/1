<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Natural Chinese — Workplace Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#16100a;--cream:#faf7f2;--warm:#f2ebe0;
  --red:#c0392b;--gold:#b8861f;--green:#1e7d45;
  --blue:#1a5276;--purple:#6c3483;
  --muted:#7a6e62;--border:#e0d4c0;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--ink);overflow:hidden}
.screen{position:fixed;inset:0;overflow-y:auto;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;will-change:transform}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.slide-out{transform:translateX(-28%);opacity:0;pointer-events:none}

/* ══ HOME ══ */
#home{background:var(--ink)}
.home-hero{position:relative;height:46vw;max-height:250px;overflow:hidden}
.home-hero img{width:100%;height:100%;object-fit:cover;opacity:.38;filter:grayscale(15%)}
.home-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(22,16,10,.1),rgba(22,16,10,1))}
.home-hero-text{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 10px}
.home-tag{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.home-title{font-family:'Playfair Display',serif;font-size:clamp(24px,6.5vw,34px);font-weight:900;color:#faf7f2;line-height:1.05}
.home-title .red{color:var(--red)}
.home-sub{padding:10px 20px 0;font-size:12.5px;color:#7a6a5a;line-height:1.7}

.progress-bar-wrap{padding:14px 20px 0}
.progress-label{font-size:11px;color:#7a6a5a;margin-bottom:5px;display:flex;justify-content:space-between}
.progress-track{background:rgba(255,255,255,.08);border-radius:4px;height:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#e6a817);border-radius:4px;transition:width .5s}

.home-section-label{padding:18px 20px 8px;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700}
.cat-list{padding:0 12px 32px;display:flex;flex-direction:column;gap:9px}

.cat-card{border-radius:14px;overflow:hidden;display:flex;align-items:stretch;cursor:pointer;border:1px solid rgba(255,255,255,.06);transition:transform .15s;-webkit-user-select:none;user-select:none}
.cat-card:active{transform:scale(.97)}
.cat-img{width:78px;flex-shrink:0;position:relative;overflow:hidden}
.cat-img img{width:100%;height:100%;object-fit:cover}
.cat-img-overlay{position:absolute;inset:0;opacity:.45}
.cat-body{flex:1;background:rgba(255,255,255,.055);padding:13px 13px 11px;display:flex;flex-direction:column;gap:4px}
.cat-emoji{font-size:17px;line-height:1}
.cat-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#faf7f2}
.cat-desc{font-size:11px;color:#7a6a5a;line-height:1.5}
.cat-meta{margin-top:4px;display:flex;align-items:center;gap:8px}
.cat-count{font-size:10px;letter-spacing:.5px;color:var(--gold);font-weight:500}
.cat-prog-mini{flex:1;background:rgba(255,255,255,.08);border-radius:3px;height:3px;overflow:hidden}
.cat-prog-mini-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s}

/* ══ CATEGORY ══ */
.cat-screen{background:var(--cream)}
.cat-top{position:relative;height:160px;overflow:hidden;flex-shrink:0}
.cat-top img{width:100%;height:100%;object-fit:cover}
.cat-top-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(22,16,10,.15),rgba(22,16,10,.82))}
.back-btn{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.45);border:none;color:#fff;font-size:17px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5}
.cat-top-content{position:absolute;bottom:0;left:0;right:0;padding:12px 18px 14px}
.cat-top-tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.cat-top-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#faf7f2;line-height:1.1}
.phrase-list{padding:12px 12px 40px;display:flex;flex-direction:column;gap:7px}

.phrase-row{background:white;border-radius:12px;display:flex;align-items:center;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .12s}
.phrase-row:active{transform:scale(.97)}
.pr-left{padding:11px 12px;flex:1;display:flex;flex-direction:column;gap:2px}
.pr-bad-zh{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#c0392b;font-weight:700;text-decoration:line-through;text-decoration-color:#e88}
.pr-bad-py{font-size:9px;color:#c08080;font-style:italic}
.pr-arrow{color:#bbb;font-size:10px;padding:1px 0}
.pr-good-zh{font-family:'Noto Sans SC',sans-serif;font-size:15px;color:#1e7d45;font-weight:700}
.pr-good-py{font-size:9px;color:#5a8a6a;font-style:italic}
.pr-right{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 6px;border-left:1px solid var(--border);align-self:stretch}
.pr-scene{font-size:8px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);text-align:center;font-weight:600}
.pr-done{font-size:15px}

/* ══ DETAIL ══ */
.detail-screen{background:var(--cream)}
.detail-img-wrap{position:relative;height:180px;overflow:hidden;flex-shrink:0}
.detail-img-wrap img{width:100%;height:100%;object-fit:cover}
.detail-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(22,16,10,.05),rgba(250,247,242,1))}
.detail-back{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.45);border:none;color:#fff;font-size:17px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5}
.detail-num{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.45);color:var(--gold);font-size:9.5px;letter-spacing:2px;padding:4px 11px;border-radius:20px;text-transform:uppercase}
.detail-body{padding:4px 16px 52px;display:flex;flex-direction:column;gap:13px}
.detail-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--ink);line-height:1.2}

/* compare */
.cmp-block{display:flex;flex-direction:column;gap:7px}
.cmp{border-radius:11px;padding:13px 15px}
.cmp-bad{background:#fdf0ef;border:1.5px solid #f5c6c2}
.cmp-good{background:#edf7f1;border:1.5px solid #b7dfc6}
.cmp-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.cmp-bad .cmp-lbl{color:#c0392b}
.cmp-good .cmp-lbl{color:#1e7d45}
.cmp-main-row{display:flex;align-items:center;gap:10px}
.cmp-zh{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--ink);line-height:1.3;flex:1}
.cmp-py{font-size:11px;color:var(--muted);font-style:italic;margin:3px 0}
.cmp-en{font-size:12px;color:#5a5249}

.audio-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:transform .1s;-webkit-user-select:none;user-select:none}
.audio-btn:active{transform:scale(.85)}
.cmp-bad .audio-btn{background:#f5c6c2;color:#c0392b}
.cmp-good .audio-btn{background:#b7dfc6;color:#1e7d45}
.audio-btn.playing{animation:pulse .6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(30,125,69,.4)}70%{box-shadow:0 0 0 8px rgba(30,125,69,0)}100%{box-shadow:0 0 0 0 rgba(30,125,69,0)}}

/* SUBTEXT BOX — boss潜台词 */
.subtext-box{background:var(--ink);border-radius:11px;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.subtext-row{display:flex;flex-direction:column;gap:3px}
.subtext-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.subtext-label.literal{color:#a09080}
.subtext-label.real{color:#e67e22}
.subtext-text{font-size:13px;line-height:1.6;color:#d4c8b8}
.subtext-text.real-text{color:#f0a500;font-weight:500}
.subtext-divider{height:1px;background:rgba(255,255,255,.08);margin:2px 0}

/* insight */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ibox{background:white;border:1px solid var(--border);border-radius:10px;padding:11px}
.ibox-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:5px}
.ibox-txt{font-size:11.5px;color:var(--muted);line-height:1.65}
.ibox-txt strong{color:var(--ink);font-weight:500}

/* context */
.ctx{background:var(--warm);border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.ctx-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ctx-txt{font-size:12px;color:var(--muted);line-height:1.65}
.ctx-txt strong{color:var(--ink)}

/* WECHAT TEMPLATE */
.wechat-template{background:#075e54;border-radius:12px;overflow:hidden}
.wct-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.wct-title{color:#b2dfdb;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.wct-body{background:#ece5dd;padding:12px}
.wct-bubble-wrap{display:flex;justify-content:flex-end;margin-bottom:8px}
.wct-bubble{background:#dcf8c6;padding:10px 13px;border-radius:10px;border-top-right-radius:2px;max-width:85%}
.wct-zh{font-family:'Noto Sans SC',sans-serif;font-size:16px;font-weight:400;color:#111;display:block;line-height:1.45}
.wct-py{font-size:10px;color:#888;display:block;margin-top:2px;font-style:italic}
.wct-en{font-size:11px;color:#666;display:block;margin-top:2px}
.copy-btn{width:100%;padding:11px;background:var(--ink);color:var(--cream);border:none;border-radius:8px;font-size:12.5px;font-weight:700;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;transition:background .15s}
.copy-btn:active{background:#2a2018}
.copy-btn.copied{background:var(--green)}

/* more */
.section-hd{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700}
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.more-pill{background:white;border:1px solid var(--border);border-radius:10px;padding:9px 11px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .1s}
.more-pill:active{background:var(--warm)}
.mp-row{display:flex;align-items:center;justify-content:space-between}
.mp-zh{font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:700;color:var(--ink)}
.mp-audio{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;color:var(--gold)}
.mp-en{font-size:10.5px;color:var(--muted)}

/* nav dots */
.nav-dots{display:flex;justify-content:center;gap:6px;padding:4px 0 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s,width .2s;cursor:pointer}
.dot.active{background:var(--gold);width:18px;border-radius:3px}

/* QUIZ */
.quiz-wrap{background:white;border-radius:13px;overflow:hidden;border:1px solid var(--border)}
.quiz-header{background:var(--ink);padding:11px 15px;display:flex;align-items:center;justify-content:space-between}
.quiz-title{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700}
.quiz-score-badge{background:rgba(255,255,255,.1);color:var(--gold);font-size:10.5px;padding:3px 10px;border-radius:10px}
.quiz-body{padding:14px}
.quiz-question{font-size:13.5px;color:var(--ink);line-height:1.6;margin-bottom:12px;font-weight:500}
.q-zh{font-family:'Noto Sans SC',sans-serif;font-size:18px;font-weight:700;display:block;margin-bottom:4px}
.quiz-options{display:flex;flex-direction:column;gap:7px}
.quiz-option{border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;cursor:pointer;font-size:13px;color:var(--ink);display:flex;align-items:center;gap:8px;transition:border-color .15s,background .15s;-webkit-user-select:none;user-select:none}
.quiz-option:active{background:var(--warm)}
.quiz-option.correct{background:#edf7f1;border-color:#1e7d45;color:#1e7d45}
.quiz-option.wrong{background:#fdf0ef;border-color:#c0392b;color:#c0392b}
.opt-zh{font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:700}
.opt-icon{margin-left:auto;font-size:15px}
.quiz-feedback{margin-top:11px;padding:11px 13px;border-radius:9px;font-size:12.5px;line-height:1.6;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.good{background:#edf7f1;color:#1e7d45}
.quiz-feedback.bad{background:#fdf0ef;color:#c0392b}
.quiz-next-btn{margin-top:11px;width:100%;padding:12px;background:var(--ink);color:var(--cream);border:none;border-radius:9px;font-size:12.5px;font-weight:700;letter-spacing:.5px;cursor:pointer;display:none}
.quiz-next-btn.show{display:block}
.quiz-complete{text-align:center;padding:16px;display:none}
.quiz-complete.show{display:block}
.qc-emoji{font-size:38px;margin-bottom:7px}
.qc-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--ink);margin-bottom:5px}
.qc-sub{font-size:12.5px;color:var(--muted)}
.qc-retry{margin-top:12px;background:var(--ink);color:var(--cream);border:none;padding:11px 26px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="screen" id="home">
  <div class="home-hero">
    <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80" alt="">
    <div class="home-hero-overlay"></div>
    <div class="home-hero-text">
      <div class="home-tag">Natural Chinese · Workplace Edition · $19.9</div>
      <div class="home-title">Sound Like You<br><span class="red">Belong at Work.</span></div>
    </div>
  </div>
  <p class="home-sub">Real workplace Chinese — what your boss actually means, WeChat templates you can copy, and phrases that get you promoted.</p>
  <div class="progress-bar-wrap">
    <div class="progress-label"><span>Your progress</span><span id="home-progress-text">0 / 0 completed</span></div>
    <div class="progress-track"><div class="progress-fill" id="home-progress-fill" style="width:0%"></div></div>
  </div>
  <div class="home-section-label">Choose your situation</div>
  <div class="cat-list" id="cat-list"></div>
</div>

<div class="screen hidden" id="cat-screen">
  <div class="cat-top">
    <img id="cat-img" src="" alt="">
    <div class="cat-top-overlay"></div>
    <button class="back-btn" onclick="goBack('cat-screen','home')">←</button>
    <div class="cat-top-content">
      <div class="cat-top-tag" id="cat-tag"></div>
      <div class="cat-top-title" id="cat-title"></div>
    </div>
  </div>
  <div class="phrase-list" id="phrase-list"></div>
</div>

<div class="screen hidden" id="detail-screen">
  <div class="detail-img-wrap">
    <img id="detail-img" src="" alt="">
    <div class="detail-img-overlay"></div>
    <button class="detail-back" onclick="goBack('detail-screen','cat-screen')">←</button>
    <div class="detail-num" id="detail-num"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
const DATA = {
  boss:{
    name:"Boss Subtext",tag:"🧠 What Your Boss Really Means",
    img:"https://images.unsplash.com/photo-1553877522-43269d4ea984?w=800&q=80",
    color:"#c0392b",
    phrases:[
      {
        id:"boss1",title:"Boss says: \"你先看着办吧\"",scene:"Feedback",
        img:"https://images.unsplash.com/photo-1553877522-43269d4ea984?w=800&q=80",
        bad:{zh:"你先看着办吧。",py:"Nǐ xiān kànzhe bàn ba.",en:"You just handle it first."},
        good:{zh:"我对这个方案不满意。",py:"Wǒ duì zhège fāng'àn bù mǎnyì.",en:"I'm not happy with this plan."},
        subtext:{literal:"You just look and do it first.",real:"I am extremely unhappy with this. Fix it immediately or you're in trouble."},
        why:"Chinese bosses rarely say \"I don't like this\" directly. \"看着办\" sounds casual but is actually a warning that things need to change NOW.",
        use:"When you hear <strong>看着办</strong>, stop what you're doing and ask for a meeting. Don't wait. Don't guess. Clarify immediately.",
        ctx:{icon:"⚠️",label:"Career tip",text:"Responding with <strong>好的，我马上改</strong> (OK, I'll fix it right away) shows awareness. Silence or \"OK\" alone signals you didn't understand the urgency."},
        template:{zh:"好的，我马上重新做，您看哪里需要改进？",py:"Hǎo de, wǒ mǎshàng chóngxīn zuò, nín kàn nǎlǐ xūyào gǎijìn?",en:"Got it, I'll redo it now — where should I improve?"},
        more:[{zh:"好的，马上改",en:"OK, fixing it now"},{zh:"我重新做一版",en:"I'll redo a version"},{zh:"您觉得哪里不对",en:"Where do you think is wrong?"},{zh:"我理解了",en:"I understand"}],
        quiz:[
          {q:"Your boss says \"你先看着办吧\" after reviewing your report. What does it really mean?",options:["Great job, handle it as you see fit","I trust your judgment completely","I'm unhappy — fix it now or there will be consequences","Take your time, no rush"],answer:2,feedback:"✅ 对！\"看着办\" sounds calm but means the boss is actually displeased and expects immediate action. Never treat it as approval."}
        ]
      },
      {
        id:"boss2",title:"Boss says: \"这个方向可以，但是…\"",scene:"Meeting",
        img:"https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80",
        bad:{zh:"这个方向可以，但是…",py:"Zhège fāngxiàng kěyǐ, dànshì…",en:"This direction is okay, but…"},
        good:{zh:"这个方向不行，重新想。",py:"Zhège fāngxiàng bùxíng, chóngxīn xiǎng.",en:"This direction doesn't work, rethink it."},
        subtext:{literal:"This direction is okay, but...",real:"Everything before 'but' doesn't matter. The real message is after. This direction is probably being rejected."},
        why:"In Chinese workplace culture, \"可以，但是\" = \"no.\" The positive opener is just politeness. Everything after 但是 is the real message.",
        use:"Train yourself to only hear what comes AFTER <strong>但是</strong>. The first part is face-saving, not feedback.",
        ctx:{icon:"💼",label:"Meeting tip",text:"When your boss uses 但是, take notes on what follows. Ask <strong>所以您的意思是…？</strong> (So what you mean is…?) to confirm you understood correctly."},
        template:{zh:"明白了，所以您的意思是我需要重新调整___这部分，对吗？",py:"Míngbái le, suǒyǐ nín de yìsi shì wǒ xūyào chóngxīn tiáozhěng ___ zhè bùfen, duì ma?",en:"Got it — so you mean I need to rework the ___ part, right?"},
        more:[{zh:"我明白了",en:"I understand now"},{zh:"所以您的意思是",en:"So what you mean is"},{zh:"我重新调整一下",en:"I'll readjust"},{zh:"请给我一点时间",en:"Please give me some time"}],
        quiz:[
          {q:"Boss: \"这个PPT方向可以，但是数据不够有说服力。\" What should you focus on?",options:["The direction — he said it was okay","The data — that's what needs fixing","Both equally","Neither, he seemed satisfied"],answer:1,feedback:"✅ 对！Ignore everything before 但是. The real feedback is: your data is weak. Fix the data."}
        ]
      },
      {
        id:"boss3",title:"Boss says: \"辛苦了\"",scene:"After Work",
        img:"https://images.unsplash.com/photo-1497366811353-6870744d04b2?w=800&q=80",
        bad:{zh:"辛苦了。",py:"Xīnkǔ le.",en:"You worked hard."},
        good:{zh:"谢谢你今天的付出。",py:"Xièxie nǐ jīntiān de fùchū.",en:"Thank you for today's effort."},
        subtext:{literal:"You've been through hardship.",real:"I see your effort and I appreciate it. This is genuine praise from a Chinese boss — it's a big deal."},
        why:"\"辛苦了\" is one of the highest forms of acknowledgment from a Chinese boss. It means they noticed your hard work.",
        use:"Always reply with <strong>应该的</strong> (it's what I should do) — not \"thank you.\" Saying 谢谢 to a compliment sounds like you're accepting praise, which is considered arrogant.",
        ctx:{icon:"🏆",label:"Response tip",text:"The correct reply is <strong>应该的，这是我应该做的</strong>. This shows humility and earns more respect than any thank-you."},
        template:{zh:"应该的！这是我应该做的，您也辛苦了！",py:"Yīnggāi de! Zhè shì wǒ yīnggāi zuò de, nín yě xīnkǔ le!",en:"Of course! This is what I should do — you worked hard too!"},
        more:[{zh:"应该的",en:"It's what I should do"},{zh:"没什么",en:"It's nothing"},{zh:"还差得远呢",en:"I still have a long way to go"},{zh:"向您学习",en:"I'm learning from you"}],
        quiz:[

const progress = {};
let currentCat = null;
let currentPhraseIdx = 0;
let quizState = {};

function allPhrases(){return Object.values(DATA).flatMap(c=>c.phrases)}
function completedCount(){return Object.keys(progress).length}

function updateHomeProgress(){
  const total=allPhrases().length,done=completedCount();
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('home-progress-text').textContent=`${done} / ${total} completed`;
  document.getElementById('home-progress-fill').style.width=pct+'%';
}

function buildHome(){
  const list=document.getElementById('cat-list');
  list.innerHTML='';
  Object.entries(DATA).forEach(([id,cat])=>{
    const total=cat.phrases.length,done=cat.phrases.filter(p=>progress[p.id]).length;
    const pct=total?Math.round(done/total*100):0;
    const card=document.createElement('div');
    card.className='cat-card';
    card.innerHTML=`
      <div class="cat-img">
        <img src="${cat.img}" alt="">
        <div class="cat-img-overlay" style="background:${cat.color}"></div>
      </div>
      <div class="cat-body">
        <div class="cat-emoji">${cat.tag.split(' ')[0]}</div>
        <div class="cat-name">${cat.name}</div>
        <div class="cat-desc">${cat.tag.substring(2)}</div>
        <div class="cat-meta">
          <div class="cat-count">${done}/${total} done</div>
          <div class="cat-prog-mini"><div class="cat-prog-mini-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    card.onclick=()=>openCat(id);
    list.appendChild(card);
  });
  updateHomeProgress();
}

function openCat(catId){
  currentCat=catId;
  const cat=DATA[catId];
  document.getElementById('cat-img').src=cat.img;
  document.getElementById('cat-tag').textContent=cat.tag;
  document.getElementById('cat-title').textContent=cat.name;
  const list=document.getElementById('phrase-list');
  list.innerHTML='';
  cat.phrases.forEach((p,i)=>{
    const done=!!progress[p.id];
    const row=document.createElement('div');
    row.className='phrase-row';
    row.innerHTML=`
      <div class="pr-left">
        <span class="pr-bad-zh">${p.bad.zh}</span>
        <span class="pr-bad-py">${p.bad.py}</span>
        <div class="pr-arrow">↓</div>
        <span class="pr-good-zh">${p.good.zh}</span>
        <span class="pr-good-py">${p.good.py}</span>
      </div>
      <div class="pr-right">
        <span class="pr-scene">${p.scene}</span>
        <span class="pr-done">${done?'✅':'›'}</span>
      </div>`;
    row.onclick=()=>openDetail(i);
    list.appendChild(row);
  });
  slideIn('cat-screen','home');
}

function openDetail(idx){
  currentPhraseIdx=idx;
  quizState={qIdx:0,score:0,answered:false};
  renderDetail(idx);
  slideIn('detail-screen','cat-screen');
}

let currentUtterance=null;
function speak(text,btn){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(currentUtterance&&btn.classList.contains('playing')){btn.classList.remove('playing');currentUtterance=null;return;}
  document.querySelectorAll('.audio-btn').forEach(b=>b.classList.remove('playing'));
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';u.rate=0.85;u.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(x=>x.lang.startsWith('zh'));
  if(v)u.voice=v;
  u.onend=()=>{btn.classList.remove('playing');currentUtterance=null;};
  u.onerror=()=>{btn.classList.remove('playing');currentUtterance=null;};
  btn.classList.add('playing');
  currentUtterance=u;
  window.speechSynthesis.speak(u);
}

function speakFromPill(el,text){speak(text,el.querySelector('.mp-audio'))}

async function copyTemplate(text,btn){
  try{
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    btn.innerHTML='✅ Copied! Paste into WeChat';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='📋 Copy & Paste into WeChat';},2500);
  }catch(e){
    btn.innerHTML='📋 '+text;
  }
}

function renderDetail(idx){
  const cat=DATA[currentCat],p=cat.phrases[idx];
  document.getElementById('detail-img').src=p.img;
  document.getElementById('detail-num').textContent=`${idx+1} / ${cat.phrases.length}`;

  const subtextHTML=p.subtext?`
    <div class="subtext-box">
      <div class="subtext-row">
        <span class="subtext-label literal">📖 Literal meaning</span>
        <span class="subtext-text">"${p.subtext.literal}"</span>
      </div>
      <div class="subtext-divider"></div>
      <div class="subtext-row">
        <span class="subtext-label real">⚠️ Real meaning</span>
        <span class="subtext-text real-text">"${p.subtext.real}"</span>
      </div>
    </div>`:'';

  const templateHTML=p.template?`
    <div class="section-hd">📱 WeChat Template — Copy & Send</div>
    <div class="wechat-template">
      <div class="wct-header"><span class="wct-title">Ready to send</span><span style="color:#b2dfdb;font-size:11px">WeChat</span></div>
      <div class="wct-body">
        <div class="wct-bubble-wrap">
          <div class="wct-bubble">
            <span class="wct-zh">${p.template.zh}</span>
            <span class="wct-py">${p.template.py}</span>
            <span class="wct-en">${p.template.en}</span>
          </div>
        </div>
        <button class="copy-btn" onclick="copyTemplate('${p.template.zh.replace(/'/g,"\\'")}',this)">📋 Copy & Paste into WeChat</button>
      </div>
    </div>`:'';

  const moreHTML=p.more?`
    <div class="section-hd">More phrases like this</div>
    <div class="more-grid">
      ${p.more.map(m=>`
        <div class="more-pill" onclick="speakFromPill(this,'${m.zh.replace(/'/g,"\\'")}')">
          <div class="mp-row"><span class="mp-zh">${m.zh}</span><button class="mp-audio">🔊</button></div>
          <span class="mp-en">${m.en}</span>
        </div>`).join('')}
    </div>`:'';

  const quizHTML=buildQuizHTML(p);
  const dots=Array.from({length:cat.phrases.length},(_,i)=>
    `<div class="dot${i===idx?' active':''}" onclick="openDetail(${i})"></div>`).join('');

  document.getElementById('detail-body').innerHTML=`
    <div class="detail-title">${p.title}</div>
    <div class="cmp-block">
      <div class="cmp cmp-bad">
        <div class="cmp-lbl">❌ Textbook Chinese</div>
        <div class="cmp-main-row">
          <div style="flex:1"><div class="cmp-zh">${p.bad.zh}</div><div class="cmp-py">${p.bad.py}</div><div class="cmp-en">"${p.bad.en}"</div></div>
          <button class="audio-btn" onclick="speak('${p.bad.zh.replace(/'/g,"\\'")}',this)">🔊</button>
        </div>
      </div>
      <div class="cmp cmp-good">
        <div class="cmp-lbl">✅ Natural Chinese</div>
        <div class="cmp-main-row">
          <div style="flex:1"><div class="cmp-zh">${p.good.zh}</div><div class="cmp-py">${p.good.py}</div><div class="cmp-en">"${p.good.en}"</div></div>
          <button class="audio-btn" onclick="speak('${p.good.zh.replace(/'/g,"\\'")}',this)">🔊</button>
        </div>
      </div>
    </div>
    ${subtextHTML}
    <div class="insight-grid">
      <div class="ibox"><div class="ibox-lbl">💡 Why it's off</div><div class="ibox-txt">${p.why}</div></div>
      <div class="ibox"><div class="ibox-lbl">🎯 Use it today</div><div class="ibox-txt">${p.use}</div></div>
    </div>
    ${templateHTML}
    <div class="ctx"><div class="ctx-icon">${p.ctx.icon}</div><div class="ctx-txt"><strong>${p.ctx.label}:</strong> ${p.ctx.text}</div></div>
    ${moreHTML}
    ${quizHTML}
    <div class="nav-dots">${dots}</div>`;
}

function buildQuizHTML(p){
  if(!p.quiz||!p.quiz.length)return'';
  const q=p.quiz[quizState.qIdx];
  const total=p.quiz.length;
  return`<div class="quiz-wrap" id="quiz-wrap">
    <div class="quiz-header">
      <span class="quiz-title">🧠 Practice Quiz</span>
      <span class="quiz-score-badge" id="quiz-score-badge">Q${quizState.qIdx+1} / ${total}</span>
    </div>
    <div class="quiz-body" id="quiz-body">
      <div class="quiz-question">${q.qzh?`<span class="q-zh">${q.qzh}</span>`:''}${q.q}</div>
      <div class="quiz-options" id="quiz-options">
        ${q.options.map((o,i)=>`<div class="quiz-option" id="opt-${i}" onclick="answerQuiz(${i},${q.answer},'${p.id}')"><span class="opt-zh">${o}</span><span class="opt-icon" id="opt-icon-${i}"></span></div>`).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <button class="quiz-next-btn" id="quiz-next-btn" onclick="nextQuiz('${p.id}')">Next →</button>
    </div>
    <div class="quiz-complete" id="quiz-complete">
      <div class="qc-emoji" id="qc-emoji"></div>
      <div class="qc-title" id="qc-title"></div>
      <div class="qc-sub" id="qc-sub"></div>
      <button class="qc-retry" onclick="retryQuiz('${p.id}')">Try again</button>
    </div>
  </div>`;
}

function answerQuiz(chosen,correct,phraseId){
  if(quizState.answered)return;
  quizState.answered=true;
  const isRight=chosen===correct;
  if(isRight)quizState.score++;
  document.querySelectorAll('.quiz-option').forEach((o,i)=>{
    o.style.pointerEvents='none';
    if(i===correct){o.classList.add('correct');document.getElementById(`opt-icon-${i}`).textContent='✓';}
    else if(i===chosen&&!isRight){o.classList.add('wrong');document.getElementById(`opt-icon-${i}`).textContent='✗';}
  });
  const p=DATA[currentCat].phrases[currentPhraseIdx];
  const q=p.quiz[quizState.qIdx];
  const fb=document.getElementById('quiz-feedback');
  fb.textContent=q.feedback;
  fb.className='quiz-feedback show '+(isRight?'good':'bad');
  const btn=document.getElementById('quiz-next-btn');
  btn.textContent=quizState.qIdx+1<p.quiz.length?'Next question →':'See results →';
  btn.classList.add('show');
}

function nextQuiz(phraseId){
  const p=DATA[currentCat].phrases[currentPhraseIdx];
  if(quizState.qIdx+1<p.quiz.length){
    quizState.qIdx++;quizState.answered=false;
    const q=p.quiz[quizState.qIdx];
    document.getElementById('quiz-score-badge').textContent=`Q${quizState.qIdx+1} / ${p.quiz.length}`;
    document.getElementById('quiz-body').querySelector('.quiz-question').innerHTML=(q.qzh?`<span class="q-zh">${q.qzh}</span>`:'')+q.q;
    document.getElementById('quiz-options').innerHTML=q.options.map((o,i)=>`<div class="quiz-option" id="opt-${i}" onclick="answerQuiz(${i},${q.answer},'${phraseId}')"><span class="opt-zh">${o}</span><span class="opt-icon" id="opt-icon-${i}"></span></div>`).join('');
    document.getElementById('quiz-feedback').className='quiz-feedback';
    document.getElementById('quiz-next-btn').classList.remove('show');
  }else{
    document.getElementById('quiz-body').style.display='none';
    const comp=document.getElementById('quiz-complete');comp.classList.add('show');
    const pct=Math.round(quizState.score/p.quiz.length*100);
    document.getElementById('qc-emoji').textContent=pct===100?'🎉':pct>=50?'👍':'💪';
    document.getElementById('qc-title').textContent=`${quizState.score} / ${p.quiz.length} correct`;
    document.getElementById('qc-sub').textContent=pct===100?'Perfect! You sound like a workplace pro.'
      :pct>=50?'Good! Review the phrases and you\'ll nail it.':'Read through again and retry!';
    if(quizState.score>0){progress[phraseId]=true;buildHome();}
  }
}

function retryQuiz(phraseId){
  quizState={qIdx:0,score:0,answered:false};
  document.getElementById('quiz-complete').classList.remove('show');
  document.getElementById('quiz-body').style.display='';
  const p=DATA[currentCat].phrases[currentPhraseIdx];
  const q=p.quiz[0];
  document.getElementById('quiz-score-badge').textContent=`Q1 / ${p.quiz.length}`;
  document.getElementById('quiz-body').querySelector('.quiz-question').innerHTML=(q.qzh?`<span class="q-zh">${q.qzh}</span>`:'')+q.q;
  document.getElementById('quiz-options').innerHTML=q.options.map((o,i)=>`<div class="quiz-option" id="opt-${i}" onclick="answerQuiz(${i},${q.answer},'${phraseId}')"><span class="opt-zh">${o}</span><span class="opt-icon" id="opt-icon-${i}"></span></div>`).join('');
  document.getElementById('quiz-feedback').className='quiz-feedback';
  document.getElementById('quiz-next-btn').classList.remove('show');
}

function slideIn(toId,fromId){
  const to=document.getElementById(toId),from=document.getElementById(fromId);
  from.classList.add('slide-out');to.classList.remove('hidden');to.scrollTop=0;
  setTimeout(()=>{from.classList.add('hidden');from.classList.remove('slide-out');},370);
}

function goBack(fromId,toId){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const from=document.getElementById(fromId),to=document.getElementById(toId);
  from.classList.add('hidden');to.classList.remove('hidden','slide-out');
  if(toId==='cat-screen')openCat(currentCat);
  else if(toId==='home')buildHome();
  to.scrollTop=0;
}

buildHome();
window.speechSynthesis&&window.speechSynthesis.getVoices();
</script>
</body>
</html>
